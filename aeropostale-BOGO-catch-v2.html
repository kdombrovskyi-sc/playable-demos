<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aeropostale - BOGO Catch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #7BB8DB;
            margin: 0;
            touch-action: none;
        }

        .ad-container {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #A8CDEE 0%, #C6E0F5 100%);
            overflow: hidden;
            color: #1A3B5C;
            display: flex;
            flex-direction: column;
        }

        /* Background Watermarks */
        .bg-deco-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .deco-text {
            position: absolute;
            font-weight: 900;
            font-style: italic;
        }
        .deco-text.solid {
            color: rgba(255, 255, 255, 0.25);
        }
        .deco-text.hollow {
            display: flex;
        }
        .deco-text.hollow svg text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 58px;
            font-style: italic;
            font-weight: 700;
            letter-spacing: 1px;
            fill: none;
            stroke: #ffffff;
            stroke-opacity: 0.28;
            stroke-width: 3;
            paint-order: stroke;
            stroke-linejoin: round;
        }

        .score-pill {
            position: absolute;
            top: clamp(60px, 15vmin, 90px);
            right: clamp(10px, 4vmin, 20px);
            z-index: 20;
            font-size: clamp(11px, 3.5vmin, 14px);
            font-weight: 700;
            background: rgba(26, 45, 65, 0.7);
            padding: clamp(4px, 1.5vmin, 6px) clamp(8px, 3vmin, 12px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: clamp(4px, 1.5vmin, 6px);
            opacity: 1;
            transition: opacity 0.5s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #F2C94C;
        }

        .score-pill svg {
            width: 16px; height: 16px; fill: #F2C94C;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Start Screen */
        #screen-start {
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 25;
            color: white;
        }

        .start-logo {
            width: clamp(60px, 20vmin, 100px);
            height: clamp(60px, 20vmin, 100px);
            background: #1A3B5C;
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(14px, 5vmin, 20px);
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: clamp(8px, 3vmin, 15px);
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            border: 3px solid #fff;
        }

        .start-title {
            font-size: clamp(20px, 6vmin, 30px);
            font-weight: 900;
            margin-bottom: clamp(3px, 1vmin, 5px);
        }

        .start-subtitle {
            font-size: clamp(14px, 4.5vmin, 18px);
            font-weight: 700;
            margin-bottom: clamp(10px, 4vmin, 20px);
        }

        .start-loading {
            font-size: clamp(11px, 3.5vmin, 14px);
            color: rgba(255,255,255,0.6);
            margin-bottom: clamp(20px, 8vmin, 40px);
        }

        .start-cart {
            width: clamp(80px, 25vmin, 130px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Game Screen */
        #screen-game {
            z-index: 5;
        }

        /* Tilt Hint */
        .tilt-hint {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 45, 65, 0.85);
            padding: clamp(8px, 3vmin, 12px) clamp(14px, 5vmin, 20px);
            border-radius: 25px;
            font-size: clamp(11px, 3.5vmin, 14px);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: clamp(6px, 2.5vmin, 10px);
            white-space: nowrap;
            opacity: 1;
            transition: opacity 1s ease;
            pointer-events: none;
            z-index: 8;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        /* Player Cart */
        .player-basket {
            position: absolute;
            bottom: clamp(15px, 4vh, 40px);
            left: 0;
            width: clamp(80px, 22vmin, 120px);
            height: clamp(65px, 18vmin, 100px);
            line-height: 1;
            z-index: 10;
            will-change: transform;
            transition: transform 150ms ease-out;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.25));
        }

        /* Falling Items */
        .falling-item {
            position: absolute;
            top: 0;
            font-size: clamp(30px, 12vmin, 55px);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            z-index: 6;
            will-change: transform;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* +1 Float Text */
        .float-text {
            position: absolute;
            font-size: clamp(20px, 7vmin, 30px);
            font-weight: 900;
            color: #F2C94C;
            text-shadow: 0 3px 6px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 11;
            animation: floatUp 0.8s ease-out forwards;
        }


        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
        }

        /* Result Screens (Overlay) */
        .overlay-screen {
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            padding: clamp(12px, 5vmin, 20px);
            z-index: 30;
        }

        .result-heading {
            font-size: clamp(16px, 5vmin, 22px);
            font-weight: 900;
            color: #F2C94C;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: clamp(12px, 4vmin, 20px);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .result-card {
            background: #fff;
            color: #333;
            width: 85%;
            max-width: 320px;
            border-radius: 20px;
            padding: clamp(16px, 5vmin, 24px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: clamp(20px, 6vmin, 32px);
        }

        .result-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 16px;
            background: #f0f0f0;
        }

        .result-emoji {
            font-size: clamp(80px, 28vmin, 140px);
            margin-bottom: clamp(4px, 2vmin, 10px);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1.1;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .result-title {
            font-size: clamp(22px, 6.5vmin, 30px);
            font-weight: 900;
            color: #111;
            margin-bottom: clamp(6px, 2vmin, 10px);
            line-height: 1.2;
        }

        .result-desc {
            font-size: clamp(13px, 4vmin, 16px);
            color: #555;
            line-height: 1.5;
            font-weight: 600;
        }

        .cta-btn {
            background: #FFF;
            border: 1px solid rgba(255, 255, 255, 0.40);
            padding: 10px 12px 8px 10px;
            border-radius: 12px;
            font-family: "Avenir Next", -apple-system, sans-serif;
            font-size: 22px;
            font-style: normal;
            font-weight: 600;
            line-height: 28px;
            letter-spacing: 0;
            color: #000;
            text-shadow: 0 2.25px 20.25px rgba(79, 20, 20, 0.25);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-bottom: clamp(12px, 3.5vmin, 18px);
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.15);
            max-width: 80%;
            box-sizing: border-box;
        }

        .cta-btn svg {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            fill: #007AFF;
        }

        .cta-btn:active {
            background: #EEEEEE;
        }

        .play-again-btn {
            background: transparent;
            border: none;
            padding: clamp(8px, 2.5vmin, 12px) clamp(18px, 5.5vmin, 26px);
            border-radius: 25px;
            font-size: clamp(12px, 3.5vmin, 15px);
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: clamp(5px, 1.5vmin, 7px);
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s;
        }

        .play-again-btn:active {
            color: white;
        }


        /* Confetti */
        .confetti {
            position: absolute;
            pointer-events: none;
            z-index: 29;
        }
    </style>
</head>

</div>

<script>
    // Game Configuration
    const TARGET_SCORE = 6;
    const GOOD_ITEMS = ['👖', '👗', '👟', '👕', '🎁'];

    let score = 0;
    let isPlaying = false;
    let isPaused = false;
    let gameLoop;
    let spawnInterval;
    let activeItems = [];

    // DOM Elements
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const screenStart = document.getElementById('screen-start');
    const screenGame = document.getElementById('screen-game');
    const screenWin = document.getElementById('screen-win');
    const scoreText = document.getElementById('score-text');
    const tiltHint = document.getElementById('tilt-hint');

    // Player Configuration
    let playerX = container.clientWidth / 2;
    let targetX = playerX;
    let smoothedTilt = 0;
    let _deviceGamma = null;
    const TILT_CLAMP = 0.5;
    const TILT_SMOOTHING = 0.08;

    function getPlayerWidth() {
        return Math.max(50, container.clientWidth * 0.2);
    }
    function getHeightScale() {
        return container.clientHeight / 750;
    }

    player.style.transform = `translateX(${playerX}px) translateX(-50%)`;

    function beginCountdown() {
        setTimeout(() => {
            screenStart.classList.remove('active');
            screenGame.classList.add('active');

            setTimeout(() => {
                setupControls();
                startGame();

                setTimeout(() => {
                    tiltHint.style.opacity = '0';
                }, 3500);
            }, 300);
        }, 1200);
    }

    // MRAID Integration
    let hasStarted = false;

    function tryStart() {
        if (hasStarted) return;
        hasStarted = true;
        beginCountdown();
    }

    function onViewable(viewable) {
        if (viewable) {
            if (!hasStarted) {
                tryStart();
            } else {
                resumeGame();
            }
        } else {
            pauseGame();
        }
    }

    if (typeof mraid !== 'undefined') {
        mraid.addEventListener('viewableChange', onViewable);

        if (mraid.getState() !== 'loading' && mraid.isViewable()) {
            tryStart();
        }

        mraid.addEventListener('ready', function () {
            if (mraid.isViewable()) {
                tryStart();
            }
        });
    } else {
        setTimeout(beginCountdown, 2500);
    }

    function startGame() {
        score = 0;
        updateScoreUI();
        isPlaying = true;

        activeItems.forEach(item => item.el.remove());
        activeItems = [];

        spawnInterval = setInterval(spawnItem, 800);
        gameLoop = requestAnimationFrame(update);
    }

    function spawnItem() {
        if (!isPlaying) return;

        const emoji = GOOD_ITEMS[Math.floor(Math.random() * GOOD_ITEMS.length)];

        const itemEl = document.createElement('div');
        itemEl.classList.add('falling-item');
        itemEl.innerText = emoji;

        const cw = container.clientWidth;
        const itemWidth = Math.max(30, cw * 0.1125);
        const startX = Math.random() * (cw - itemWidth);
        itemEl.style.left = `${startX}px`;
        itemEl.style.transform = `translateY(-60px)`;

        screenGame.appendChild(itemEl);

        activeItems.push({
            el: itemEl,
            y: -60,
            x: startX,
            speed: (3 + Math.random() * 3) * getHeightScale(),
            type: 'good'
        });
    }

    function update() {
        if (!isPlaying || isPaused) return;

        let rawTilt = null;
        const accel = window._nativeAccel;
        if (accel && typeof accel.x === 'number') {
            rawTilt = Math.max(-1, Math.min(1, accel.x / TILT_CLAMP));
        } else if (_deviceGamma !== null) {
            rawTilt = Math.max(-1, Math.min(1, _deviceGamma / 30));
        }
        if (rawTilt !== null) {
            smoothedTilt += (rawTilt - smoothedTilt) * TILT_SMOOTHING;
            const cw = container.clientWidth;
            const pw = getPlayerWidth();
            let newX = (cw / 2) + smoothedTilt * (cw / 2);
            targetX = Math.max(pw / 2, Math.min(cw - pw / 2, newX));
        }

        player.style.transform = `translateX(${Math.round(targetX)}px) translateX(-50%)`;

        const playerRect = player.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();

        for (let i = activeItems.length - 1; i >= 0; i--) {
            let item = activeItems[i];

            item.y += item.speed;
            item.el.style.transform = `translateY(${item.y}px)`;

            const itemRect = item.el.getBoundingClientRect();

            const catchZoneTop = playerRect.top + playerRect.height * 0.3;

            if (
                itemRect.left < playerRect.right &&
                itemRect.right > playerRect.left &&
                itemRect.bottom > catchZoneTop &&
                itemRect.top < playerRect.bottom
            ) {
                handleCatch(item, i);
                continue;
            }

            if (item.y > containerRect.height) {
                item.el.remove();
                activeItems.splice(i, 1);
            }
        }

        if (isPlaying) {
            gameLoop = requestAnimationFrame(update);
        }
    }

    function handleCatch(item, index) {
        score++;
        showFloatText('+1', item.x, player.offsetTop - container.clientHeight * 0.05, false);
        updateScoreUI();

        item.el.remove();
        activeItems.splice(index, 1);

        if (score >= TARGET_SCORE) {
            triggerWin();
        }
    }

    function showFloatText(text, x, y, isNegative) {
        const floatEl = document.createElement('div');
        floatEl.classList.add('float-text');
        if (isNegative) floatEl.classList.add('negative');
        floatEl.innerText = text;
        floatEl.style.left = `${x}px`;
        floatEl.style.top = `${y}px`;
        screenGame.appendChild(floatEl);

        setTimeout(() => {
            floatEl.remove();
        }, 800);
    }

    function updateScoreUI() {
        scoreText.innerText = `${score}/${TARGET_SCORE}`;
    }

    function pauseGame() {
        if (!isPlaying || isPaused) return;
        isPaused = true;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function resumeGame() {
        if (!isPlaying || !isPaused) return;
        isPaused = false;
        spawnInterval = setInterval(spawnItem, 800);
        gameLoop = requestAnimationFrame(update);
    }

    function stopEngine() {
        isPlaying = false;
        isPaused = false;
        cancelAnimationFrame(gameLoop);
        clearInterval(spawnInterval);
    }

    function triggerWin() {
        stopEngine();
        generateConfetti();
        setTimeout(() => {
            screenWin.classList.add('active');
        }, 300);
    }


    function resetGame() {
        screenWin.classList.remove('active');

        // Remove confetti
        document.querySelectorAll('.confetti').forEach(el => el.remove());

        tiltHint.style.opacity = '1';
        setTimeout(() => {
            tiltHint.style.opacity = '0';
        }, 3000);

        startGame();
    }

    function generateConfetti() {
        const confEmojis = ['🎊','🎉','✨','👖','👗','👟'];
        for (let i = 0; i < 40; i++) {
            const el = document.createElement('div');
            el.className = 'confetti';
            el.innerText = confEmojis[Math.floor(Math.random() * confEmojis.length)];

            const x = Math.random() * window.innerWidth;
            const size = 18 + Math.random() * 20;
            const duration = 2.5 + Math.random() * 2.5;
            const delay = Math.random() * 0.5;

            el.style.left = x + 'px';
            el.style.top = '-50px';
            el.style.fontSize = size + 'px';
            el.style.transition = `transform ${duration}s ease-in, top ${duration}s ease-in`;
            el.style.transitionDelay = delay + 's';

            container.appendChild(el);

            setTimeout(() => {
                el.style.top = (window.innerHeight + 100) + 'px';
                el.style.transform = `rotate(${Math.random() * 720 - 360}deg)`;
            }, 50);

            setTimeout(() => {
                if (el.parentNode) el.parentNode.removeChild(el);
            }, (duration + delay) * 1000 + 100);
        }
    }

    // --- INPUT CONTROLS --- //
    function handleCTA() {
        var url = 'https://www.aeropostale.com';
        if (typeof mraid !== 'undefined') {
            mraid.open(url);
        } else {
            window.open(url, '_blank');
        }
    }

    function setupControls() {
        const updatePlayerX = (clientX) => {
            const containerRect = container.getBoundingClientRect();
            const pw = getPlayerWidth();
            let x = clientX - containerRect.left;

            if (x < pw / 2) x = pw / 2;
            if (x > containerRect.width - pw / 2) x = containerRect.width - pw / 2;

            targetX = x;
            playerX = x;
        };

        container.addEventListener('touchmove', (e) => {
            if(!isPlaying) return;
            e.preventDefault();
            updatePlayerX(e.touches[0].clientX);
        }, { passive: false });

        let isMouseDown = false;
        container.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            updatePlayerX(e.clientX);
        });
        window.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        container.addEventListener('mousemove', (e) => {
            if (isMouseDown && isPlaying) updatePlayerX(e.clientX);
        });

        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null) _deviceGamma = e.gamma;
        });
    }
</script>

</body>
</html>
